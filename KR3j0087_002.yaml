body:
  text: 宋景文筆記卷中宋宋祁撰考古莒公言左氏國語越大夫舌庸今春秋傳作后庸而姓纂舌氏引越大夫為祖今人多誤以鮑照為昭李商隱有詩云濃烹鮑照葵又金陵有人得地中石刻作鮑照字衛宏漢儀注曰太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋司馬遷死後宣帝以其官為令行太史文書而已晉灼以宏言為非是顔師古曰司馬談為太史令耳遷尊之為公豫謂遷與任安書自言僕之先人文史星厯近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也若其位在丞相上安得此言耶百官表不著其官信其非矣古者大夫字便用疊畫寫之以夫有大音故也莊子李斯嶧山碑如此古者牛唯服車書曰肇牽車牛易曰服牛乘馬漢趙過始教人用牛耕王弼傳易曰牛稼穡之資是不原漢始牛耕之意今國學行王弼易題曰周易乾傳第一下云王弼注且傳即注解名下當只云王弼乃允莒公言詩有棠棣之華逸詩有唐棣之華世人多誤以棠棣為唐棣於兄弟用之因唐誤棠且棠棣棣也唐棣栘也栘開而反合者也此兩物不相親鄭玄注禮記謂樝梨之臧者今樝與梨絶不類恐玄所指非今樝也莒公言物理不可必故聖人隨有無言之以教一世必於有則不可常見如彭祖七百嵗黃帝升天秦穆趙簡之帝所也若必於無則又忽然而有也如魏明帝時有火浣布刋去文帝所論是已易家有蜀才史記有臣瓉顔之推曰范長生自稱蜀才則蜀人也臣瓉者于瓉也唐玄宗始以隸楷易尚書古文今儒者不識古文自唐開元始豫見蘇頲撰朝覲壇頌有乩虞氏字館閣校讐官輒點乩字側云疑不知乩即稽字顔之推説唐末文籍亡散故諸儒不知字學江南惟徐鉉徐鍇中朝郭恕先此三人信其博也鍇為説文繫傳恕先作汗簡佩觹時蜀有林氏作小説然狹於徐郭太宗朝句中正亦頗留意豫頃請刻篆楷二體九經於國學豫友髙敏之笑之李陽冰深於篆隸而名作冰音凝故參政王公堯臣但讀陽凝豫曰陽凝無義唯陽冰有不冶之語周大臣王朴名朴平豆反而自謂朴案説文朴無朴音俗以朴為朴耳後魏北齊時里俗作偽字最多如巧言為辨文子為學之比隋有栁辨傳又辨之訛以鞏易巧矣豫見佛書以言辨字多作辨世人不復辨詰學者不讀説文余以為非是古者有六書安得不習春秋止戈為武反正為乏亥二首六身韓子八某為公子夏辨三豕度河仲尼登太山見七十二家字皆不同聖賢尚爾何必為固陋哉唐吕溫作由鹿賦曰由此鹿以致他鹿故曰由鹿豫案説文曰率烏者繫生烏以來之名囮囮音由吕得其意而不知説文有此囮字也焉本鳥名能獸名為猴名乙燕名借鳳為朋黨字朋本音鳯學者多不知不讀説文之過也漢書李廣傳數竒注切為所角反故學者皆曰數音朔竒孫宣公奭當世大儒亦從曰數音朔後豫得江南本乃所具反由是復觀顔注乃顔破朔從所具反云世人不知覺漢書黃霸傳云京兆尹張敞舍鶡雀飛集丞相府霸以為神爵議欲以聞顔師古曰此鶡音介字當作䲸此通用耳䲸雀大而青出羌中非武賁所載鶡也今官本介字誤作芬䲸字作鳻鳻亦音芬鳻是鳥聚貌非鳥名也豫見徐鍇本亦如此改定豫曾見蕭該漢書音義若干篇時有異議然本書十二篇今無其本顔監集諸家漢書注獨遺此不收疑顔當時不見此書云今略記於後儒林傳施讐傳云魯伯授太山毛莫如少路師古曰姓毛名莫如字少路該案風俗通姓氏篇混屯大昊之良佐漢有屯莫如為常山太守又有毛姓云毛伯文王子也見左傳漢有毛樗之為壽張令案此莫如姓非毛乃應作屯字音徒本反今人相承呼為毛忽聞為屯驚怪者多但毛屯相類容是傳寫誤耳應劭解漢書世人皆用何為風俗通而不信趙子傳蔡誼授同郡食我子公師古無注該案風俗通食我韓公子也見戰國䇿漢有食子公為博士食音嗣顔安樂傳疏廣授琅邪管路師古曰管亦管字也路為御史中丞該案草下完音丸又音官今漢書本郤作草下完風俗通姓氏篇有管莞二姓云莞蘇楚大夫見吕氏春秋漢有莞路為御史中丞即此是也又有管姓云管夷吾齊桓佐也見論語漢有管號為西河太守今莞路是草下完非竹下完及竹下官由來讀者多惑檢風俗通乃知瑕邱江公傳丁姓授楚申章昌曼君為博士至長沙太傅李竒曰姓申章名昌字曼君該案風俗通姓氏篇云由余秦相也見史記漢有由章至長沙太傅揚雄傳名曰畔牢愁李竒曰畔離牢聊也與君相離愁而無聊也該案牢字旁著水晉直作牢韋昭曰浶騷也鄭氏愁音曹又恐鷤鵙之先鳴師古鷤音大系反鵙音桂該案蘇林鷤鵙音殄絹又抶獝狂該曰獝狂無頭鬼見字林招搖泰一顔以張晏注招搖泰一皆神名該曰如淳作臯楔臯積柴於頭置牲玉於其上舉而燒之故曰臯搖儲胥弩阹該引三蒼因山谷為牛馬圉謂之阹黃圖云弩阹在上林苑外灑沈災呀壑瀆該案灑沈災而呀壑瀆兮呀或作呵呵叱問四瀆也啾啾蹌蹌入西園切神光顔曰啾啾蹌蹌騰驤貌該説啾舊亦作愁韋昭音裁梟反今書或作口旁秋該引埤倉啾衆聲也又引楚辭鳴玉鸞之啾啾為據云稽顙樹頷扶服哦伏如淳曰叩頭時項下向則樹向上也該案韋本作梨顙樹頷梨顙顙􅠁地樹頷頷觸地也今作稽顙傳寫誤耳又玄有首衝錯測攡瑩數文掜圖告十一篇該案衝作衡云八十一家相對之弟如輻轑之衛又案别録告下有玄問一篇合十二篇今脫一篇疑今人不見太玄及别録不知其謬撰為十三卷顔曰撰與撰同該案字林撰專教也音詮惟禮記音撰尚有一卷未尋得豫最愛李令伯表曰盡節於陛下之日長報劉之日短也此言之要也古文卯本栁字後借為辰卯之卯北本别字後借為西北之北虞翻笑鄭玄不識古文以卯為昧訓北曰北猶别也古人語自有椎拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夢周又曰夫子悲獲麟西狩泣孔丘雖有意緒辭亦鈍朴矣又不及沈約云黃憲牛醫之子叔度名動京師云古人名黑臀黑肩牛蝨犬子今不以為雅迎貓為食田鼠讀禮者不曰貓音茅而曰貓音苗避俗也莊子曰道在屎溺今為鄙語漢書驢非驢馬非馬龜兹王乃騾也如此語粗甚可削去也宣獻宋公嘗謂左丘明工言人事莊周工言天道二子之上無有文矣雖聖人復興蔑以加云豫謂老子道德篇為玄言之祖屈宋離騷為辭賦之祖司馬遷史記為紀傳之祖後人為之如至方不能加矩至圓不能過規矣柳子厚正符晉説雖模寫前人體裁然自出新意可謂文矣劉夢得著天論三篇理雖未極其辭至矣韓退之送窮文進學解毛穎傳原道等諸篇皆古人意思未到可以名家矣王弼注易直發胸臆不如鄭玄等師承有來也或曰何以得立為一家豫曰弼棄易象互體專附小象衍成其文是以諸儒不能訾退之今講易者已讀弼注訖至小象則更無可敷演矣劉齊善言易説曰六十四卦本之乾坤及諸卦中皆有乾坤象意孔子敘乾為玉為金坤為牛為輿之類本釋他卦所引非徒言也弼不可云得意忘象得象忘言老子曰無物之象古語亦有想象韓非子曰人希見生象得死象圖之又案其圖以想其生也故人所以意想者皆謂之象然説亦怪矣司馬相如贊曰春秋推見至隱易本隱以之顯大雅言王公大人德逮黎庶小雅推小己之得失其流及上所言雖殊其合德一也此語最佳太史公曰趙勝翩翩濁世之佳公子也見自振澤才為亂世之士治世則罪人矣春秋者天下之正法也孔子有王天下之才而不得位故見其志於春秋是以引天下之譽褒之賢者不敢私引天下之議貶之姦人不敢亂故漢人以春秋決獄所以法仲尼也曾子年七十文學始就乃能著書孔子曰參也魯蓋少時止以孝顯未如晚節之該洽也賈誼善言治朝錯善言兵董仲舒善推天人司馬遷敘事相如揚雄文章劉向父子博洽至矣韓退之稱孟軻醇乎醇者也至荀況揚雄曰大醇而小疵豫以為未之盡孟之學也雖醇於用緩荀之學也雖疵於用切揚則立言可矣不近於用賈誼善言治健而快過董仲舒一等仲舒優軟不迫切純儒也莒公言歐陽永叔推重歸去來以為江左髙文丞相以為知言或詆漢髙祖非張良陳平不能得天下曰不然良平非髙祖不能用夫智髙於良平乃能聽其謀至項羽不知用范增則敗矣髙祖之量之謀兼韓信彭越者八九故三分關東地與之而不疑當是時玩信等如股掌上一土丸爾髙祖知呂后與戚夫人有隙方病時去呂后若斷一巨拇然終不殺者以惠帝不能制陳平周勃蕭何曹參等故委戚氏不顧為天下計俾后佐之惠帝六年后八年是時天下已定姦人不能搖亂文帝以一乘車自代來即位則髙祖料之熟矣世稱文帝漢盛德主也然在朝之儒賈誼一人而已所任宰相盡髙祖時猥將庸人亦不深討禮樂典章於時詩書皆伏而未出然而天下太和兵革不興南越順德諸侯軌道胸奴雖數盜邊亦不敢深入由是言之治天下者在質而已不必尚文故曰質近實文近名文弊則民詐興矣曹操忌孔融崔琰殺之操之宇為弗裕矣孫權引殺融為比而斥虞翻誅張溫權之量又下矣待賢少忌惟劉備為綽綽云荀彧之於曹操本許以天下及議者欲加九錫彧未之許非不之許欲出諸已耳操不悟遽殺之然則天奪其爽以誅彧寧不信乎孫權用吳諸葛亮用蜀終不能得中國一尋一常地卒之并吳蜀者晉也能以身為國興亡者蜀諸葛晉謝安秦王猛是也霍光學伊尹才不周用故宣帝立王莽學周公姦足以自文故平帝篡詩曰蕭蕭馬鳴悠悠斾旌見整而靜也顔之推愛之楊柳依依雨雪霏霏寫物態慰人情也謝玄愛之遠猷辰告謝安以為佳語左太沖詩曰振衣千仞岡濯足萬里流使飄飄有世表意不減嵇康目送飛鴻語柳子厚云嘻笑之怒甚於裂眥長歌之音過於慟哭劉夢得云駭機一發浮謗如川信文之險語韓退之云婦順夫旨子嚴父詔又云耕於寬間之野釣於寂寞之濱又云持被入直三省丁寧顧婢子語刺刺不得休此等皆新語也莊周曰送君者皆自崖而反君自兹遠每讀至此令人蕭寥有遺世之意經曰孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝釋曰古者祭天於郊以其蕩蕩然蒼蒼然無乎不覆無乎不見故以至敬事之郊也者不屋者也達自然之氣也掃地而祭器尚陶匏不敢以人之所愛奉之尊之也遠而敬之也人莫不本乎祖祖一而已尊無二上故曰率義而上至於祖祖尊而不親是所以配天也周推后稷配天盡矣至矣不可以加矣周公之攝政仁乎其父欲配之郊則抗乎祖欲遂無配則已有仁父之心不能見之天下不見之天下非仁也於是乎名天以上帝而配之上帝也者近人理者也人於萬物乃一物假令天若有知然宰制生育未必圓顱方趾耳鼻食息如人者也今名之帝以人事天引天以自近親之也人之親者莫若父故以文王配上帝不可以郊故內之明堂明堂王者最尊處也仁乎其父故親於天天有帝名則祭之明堂親與敬兼之矣孔子所以美周公能以是心達於天下而不失乎至禮禮者緣人情者也或曰經前曰天後曰上帝奈何曰天上帝一耳不通言則若兩物然故郊曰昊天明堂曰昊天上帝天人之分明也明祖不可以在明堂文王不可以配郊矣夔曰簫韶九成鳳皇來儀擊石拊石百獸率舞敢問何謂也對曰以為虞氏之德上奉天下法地中得人萬物字茂寒而寒暑而暑殺之不暴貸之不私挈天下納於仁壽若奠器在壚以其成功次之歌詩轟然寫金石入匏竹無所加其德可矣鳳未始來也獸未始感也且樂作之朝作之廟作之郊乎朝有宫室之嚴廟有垣壖之護郊有營衛之禁則獸何自而至焉自山林來則必凌突淮河戢戢林林躨跜躑躅然連頓足掉首騰踏盤完何其怪也羣瞽在廷百工鴈行而獸參其間吾以為怪而不祥曰然則孔子何為不刪而著之曰樂主成功不得不盛推吾誼侈吾言以肆之有如祖考來格又將見顓頊堯瞽叟闖然於堂上耶子路問於孔子曰治國何如孔子曰尊賢而賤不肖子路曰范中行氏尊賢而賤不肖矣其亡何也曰中行氏尊賢而不能用賤不肖而不能去賢者知其不已用而怨之不肖者知其賤已而讐之賢者怨不肖者讐中行氏欲不亡得乎孔子可謂知言矣昔者郭公如是而國為墟中行氏既知之矣而不能改又及於滅蜀關公善待卒伍而驕士大夫張飛愛重君子而不恤小人二者特所偏耳身皆死於人手是不可忽也燕小國也其地於天下若靨之著面然而昭王賢王也得郭隗尊事之故鄒衍樂毅以齊趙至蘇子屈景以周楚至於是舉兵而攻齊棲閔於莒鼠伏而不敢出悉返燕地計其衆不與齊醜然而能申意至此者由得士也故曰無常安之家無常治之民得賢則安昌失賢則危亡自古迄今未有不然者也明鑒所以照景前事所以知今夫知惡往古之所以危亡而不務矯迹於其所以安昌未有以異夫郤走而求及前人也余謂佛西方之達人也其言汪茫漫誕貫生死鬼神無有濱涯合萬物之妄以為一真真立而妄隨又去真掊妄以無修無證為極若曰無修乃修也無證乃證也雖修而未嘗修雖證而未嘗證故舉天下衆生皆入無餘涅槃而滅度之者如是無量實無衆生得滅度者又曰如來説即非衆生是名衆生於以脫滯縳泯有無自放於太空無垠之所雖然法待言而立不得無言迷待法而悟不得無法故惟釋迦文殊剟言之瘢刮法之痕矣自文殊而下已自執所見所見差駮纖垢淫夷故維摩詰以一默對之乃皆悟入佛與中國老聃莊周列禦寇之言相出入大抵至於道者無今古華戎若符棨然堯之四凶今之姦臣能之周之十亂今之賢臣能之古與今交相勝耳堯舜之世比屋可封非盡可封也可封之人多也桀紂之世比屋可誅非盡可誅也可誅之人多也成康刑措四十年不用非也以為二王能用法不濫殺可矣春秋許夷狄者不一而足見中國之尊且見略於外也蜀人謂柂師為長年三老杜甫用之詩人不以事害意古者用事簡而當亦不以字害句故音韻清濁隨宜改易劉在薪中入張韻留宴汾隂西入先韻直取意順則已至唐人以律格自拘不復敢用惟白居易用其音於語中如照地麒用佶音麒袍雪擺胡用鶻音謄衫紅攔干三百六十橋用諶音等往往有之晏丞相殊嘗許之曰詩人乘語俊當如用字春秋霸之濟不在此舉也古人以濟不作兩字用謂濟與不濟也今人用不為歟耶之比不一音孚鳩反漢陳平封曲逆侯蕭何為鄼侯霍去病為嫖姚將軍今學者讀曲逆為去遇鄼作鹺驃為漂遙不作本音何耶古人自有文語卓然可愛者穀梁子曰輕千乘之國則可矣蹈道則未也故栁宗元以為潔三軍之士粲然皆笑粲明也知萬衆皆啓齒齒既白以粲義包之仲尼居三蒼作尼説文作凥亘從二間舟再名亘字隸改舟為曰何法盛以再一為舟航字宋景文筆記卷中
