body:
  text: 宋景文筆記卷上宋宋祁撰釋俗近世授觀察使者不帶金魚袋初名臣錢若水拜觀察使佩魚自若人皆疑而問之若水倦於酬辨録唐故事一畨在袖中人問者輒示之宦者宫人言正月與上諱同音故共易為初月王圭為修起居注頗熟其聞因上言秦始皇帝名政改正音政月為端月以正音政為正音征令乞廢正征音一字不用遂下兩制議兩制共是其請表去其字曾公亮疑而問豫豫曰不宜廢且月外尚有射正詩曰不出正兮不止正月矣曾寤密語相府罷之國朝有骨朵子直衛士之親近者豫嘗修日厯曾究其義關中人謂腹大者為胍􅞷上孤下都俗因謂杖頭大者亦為胍􅞷後訛為骨朵朵從平聲然朵難得音今為軍額固不可改矣豫昔領門下省會天子排正仗吏供洞案者設於前殿兩螭首間案上設燎香爐修注官夾案立豫詰吏何名洞吏辭不知豫思之通朱漆為案故名曰洞耳丞相公序謂然唐人鄭谷嘗用之宣獻宋公著鹵簿記至䂍槊不能得其始遍問諸儒無知者豫後十餘年方得其義云江左有瓝槊以首大如瓝故云䂍一作􅀈陶穀本唐彥謙後石晉時避帝諱改曰陶後納唐氏為壻亦可怪古人寫書盡用黃紙故謂之黃卷顏之推曰讀天下書未遍不得妄下雌黃雌黃與紙色類故用之以滅誤今人用白紙而好事者多用雌黃滅誤殊不相類道佛二家寫書猶用黃紙齊民要術有治雌黃法或曰古人何須用黃紙曰蘖染之可用辟蟫今臺家詔敕用黃故私家避不敢用孫炎作反切語本出於俚俗常言尚數百種故謂就為鯽溜凡人不慧者即曰不鯽溜謂團曰突欒謂精曰鯽令謂孔曰窟籠不可勝舉而唐盧同詩云不鯽溜鈍漢國朝林逋詩云團欒空繞百千回是不曉俚人反語逋雖變突為團亦其謬也碑者施於墓則下棺施於廟則繫牲古人因刻文其上今佛寺揭大石鏤文士大夫皆題曰碑銘何耶吾所未曉樂石有磬今浮屠持銅鉢亦名磬世人不識樂石而儒者往往不曉磬折義故不獨不識磬又不能知鉢搗辛物作虀南方喜之所謂金虀玉膾者古說虀臼曰受辛是臼中受辛物搗之南方之人謂水皆曰江北方之人謂水皆曰河隨方言之便而淮濟之名不顯司馬遷作河渠書並四瀆言之子虛賦曰下屬江河事已相亂後人宜不能分别言之也莒公言河陽出王鮪即今黃魚也形如豕口與目俱在腹下每春二月出於石穴逆河而上人乃取之其腥不可近官以為鮓獻御其味甚美然有毒所謂王鮪岫居者蜀人謂老為皤音波取皤皤黃髮義後有蠻王小皤作亂今國史乃作小波非是蜀人見物驚異輒曰噫嘻嚱李白作蜀道難因用之汾晉之間尊者呼左右曰咄左右必曰喏而司空圖作休休亭記又用之修書學士劉義叟為豫言晉書言咄嗟而辦非是宜言咄喏而辦然咄嗟前代人文章中多用之或自有義今造屋勢有曲折者謂之庯峻齊魏間以人有儀矩可喜者謂之庯峭蓋庯峻也集韻考庯庩屋不平也庯奔模切庩同都切儒者讀書多隨俗呼不從本音或終身不悟者凡讀廷音定皆作廷音亭故廷中廷爭柏者鬼之廷游神之廷皆作庭假借之假音嫁皆作假音賈朝請音才姓切皆作請屈請之請爛脫音奪皆作脫太守音狩作守周身之防去聲為防廷尉評去聲為評中去聲興為中興若此甚衆莒公嘗言山東曰朝陽山西曰夕陽故詩曰度其夕陽又曰梧桐生矣于彼朝陽指山之處耳後人便用夕陽為斜日誤矣豫見劉琨詩夕陽忽西流然古人亦誤用久矣夫余見今人為學不及古人之有根本每亦自愧嘗讀祭式其中有任器字注曰未詳且任器乃檐荷之具雜見子史何云未詳古今語無雅俗惟世之罕道者似雅如古以大為大音如舟柂之柂則言大雅大夫大閲大舉類不及今人言大徒帶反之雅古以車音居為車唱遮反漢以來乃言車居俗語則曰車唱遮反則今語為雅今公私文書以敕音賚為敕吏既書畫有體不復能改春秋說以人十四心為德詩說以二在天下為酉漢書以貨泉為白水真人新論以金昆為銀國志以天上有口為吳晉書以黃頭小人為恭宋書以召力為劭古無正字多假借以中為仲以說為帨以召為邵以閒為間後人以亂旁為舌揖下無耳黿鼉從龜奪奮從雀席中從帶惡上安西鼓外設皮鑿頭生毁離則配禹壑乃施溪巫混經旁臯分澤外􅀈化為獦音葛獸名業左益土靈底著器其何法哉余友楊備得古文尚書釋文讀之大喜於是書訊刺字皆用古文僚友不之識指為怪人余少為學本無師友家苦貧無書習作詩賦未始在志立名於當世也願計粟米養親紹家閥耳年二十四而以文投故宰相夏公公竒之以為必取甲科吾亦不知果是歟天聖甲子從鄉貢試禮部故龍圖學士劉公嘆所試辭賦大稱之朝以為諸生冠吾始重自淬礪力於學模寫有名士文章諸儒頗稱以為是年過五十被詔作唐書精思十餘年盡見前世諸著乃悟文章之難也雖悟於心又求之古人始得其崖略因取視五十以前所為文赧然汗下知未嘗得作者藩籬而所效皆糟粕芻狗矣一作耳夫文章必自名一家然後可以傳不朽若體規畫圓準方作矩終為人之臣僕古人譏屋下作屋信然陸機曰謝朝華于已披啓夕秀于未振韓愈曰惟陳言之務去此乃為文之要五經皆不同體孔子沒後百家奮興類不相沿是前人皆得此㫖嗚呼吾亦悟之晚矣雖然若天假吾年猶冀老而成云莒公嘗言王沂公所試有教無類有物混成賦二篇在生平論著絶出有若神助云楊億大年亦云自古文章立名不必多如王君二賦一生衣之食之不能盡李淑之文自高一代然最愛劉禹錫文章以為唐稱柳劉劉宜在栁栁州之上淑所著論多類之末年尤奧澀人讀之至有不能曉者栁州為文或取前人陳語用之不及韓吏部卓然不朽不丐於古而語一出諸已劉夢得巧於用事故韓栁不加目品焉晏相國今世之工為詩者也末年見編集者乃過萬篇唐人已來所未有然相國不自貴重其文凡門下客及官屬解聲韻者悉與酬唱上即位天聖初元以來縉紳間為詩者益少惟故丞相晏公殊錢公惟演翰林劉公筠數人而已至丞相王公曙參知政事宋公綬翰林學士李公淑文章外亦作詩而不專也其後石延年蘇舜欽梅堯臣皆自謂好為詩不能自名矣余於為文似蘧瑗瑗年五十知四十九年非余年六十始知五十九年非其庶才至於道乎天稟余才才及中人中人之流未能名一世然自力於當時則綽綽矣每見舊所作文章憎之必欲燒棄梅堯叟喜曰公之文進矣僕之為詩亦然文有屬對平側用事者供公家一時宣讀施行以便快然久之不可施於史傳發修唐書未嘗得唐人一詔一令可載於傳者唯捨對偶之文近髙古乃可著於篇大抵史近古對偶宜今以對偶之文入史䇿如粉黛飾壯士笙匏佐鼙鼓非所施云莒公常言宋宣獻公作西太乙宫碑文之極摰者也晏丞相嘗問曾明仲云劉禹錫詩有瀼西春水縠紋生生字作何意明仲曰作生育之生丞相曰非也作生熟之生語乃健莊子曰生熟不進於前王建詩曰自别城中禮數生宋景文筆記卷上
