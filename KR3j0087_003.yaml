front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0087_WYG_003-1a, image: WYG0862/WYG0862-0548c.png}
body:
  text: 宋景文筆記卷下宋宋祁撰雜說君得其健强隂戢戰臣執其㫖百度乃凝欲正四方先定中央中央君也天不待規而圓地不待矩而方天尊地卑其道有常君天道也臣地道也天用其圓地用其方圓道主於生方道主於成天君德也地臣職也君操無為以臨臣之有為萬物自歸上逸於制下勞於事百度乃治無為者非謂塞吾耳不聽也蔽吾目不視也閟吾言不出也謂審於有為之內不為於有為之外也何謂內曰官不職責之相士不練責之將財匱責司農獄不正責廷尉是為內何謂外曰嵗有常賦而又賦焉是曰賸人有常役而乂役焉是曰橫力不勝加如負則跌材已窮加如任則敗是為外振其領羣毛整提其綱萬目張綱歟領歟君所執歟君有常道臣有定守賞當功罰當罪與之惟我德奪之惟我懼君道也奉法循令竭已力以獻功於上臣道也故臣有所憎能以得君之罰以去之是謂作威有所愛能以得君之賞以貴之是謂作福法雖明意得輕重之謂之玩法令可遵情得出入之謂之侮令君喪道臣失守故曰害于而家凶于而國能無卜而知吉凶乎曰以甚治攻甚亂濟所以安除甚患能無祭而福乎曰不奪民時而順物宜能無膠漆而合乎曰不以逺近內外與之同欲一推吾心納兆人之腹能不賞而使人勸乎曰先賞有功能無罰而使人畏乎曰先罰有罪弛惡不戮姦笑於腹當封吝寵勞臣諱勇奴耕于原婢執其爨丈人以安植表挺挺下無曲影善聲之唱應無醜響不可得者上不以求不可止者上不以禁不可行者上不以令故曰求愈多得愈寡禁愈急止愈少令愈繁行愈慢上求而不得謂之失威求不可得而得謂之暴禁而不止謂之慢禁不可止而止謂之虐令而不行謂之凌上令不可行而行謂之亂故聖人慎舉錯去三不可則善矣賤而不可不因者衆也剛而不可不用者兵也慘而不可不行者法也小而不可不防者盜也勞而不可不勸者農也穴恐當作冗而不可不嗇者財也曰因衆奈何曰人之情莫不惡勞而我逸之莫不欲富而我與之莫不憚危而我安之莫不畏死而我生之民已逸則可與共勞已富則可與共乏已安則可與同憂已生則可與濟難夫民國之基也五仞之牆所以不毁基厚也所以毁基薄也故曰一無字曰百足不僵則附者衆流水不窮則來者逺民之瘠無肥國下之恱有豫一作裕君食者人仰以生也適則飽過則病甚病者死法者國仰以安也順則治逆則亂甚亂者滅商家之法一而湯以王桀以放周家之法一而文武以興幽厲以亡然則食無心於生死在人之適過法無必於治亂在君之順逆古之人淳今之人詐奈何不然人無淳詐在治亂而已今日之治三皇是也唐五代之亡桀紂是也難曰古巢居今宫室古茹毛今饔熟奈何曰是直事有工拙耳創始者難踵成者易凡百物皆是夫何足疑云東南天地之奧藏寬柔而卑西北天地之徑方雄尊而嚴故帝王之興常在西北乾道也東南坤道也東南奈何曰其土薄而水淺其生物滋其財富其為人剽而不重靡食而偷生士懦脆而少剛笮之則服西北奈何曰其土髙而水寒其生物寡其財確其為人毅而近愚食淡而勤生士沈厚而少慧屈之不撓小人之情易見也其錚錚似辨其悻悻似直攻人之私似公觸大臣撼大事似强多所建請似才數讓小官辭小祿似髙隂引其朋似薦賢攻其朋之細過似不黨故君人者𣙜以真僞則錚錚者敗討其忠邪則悻悻者露語人之私𨼆而無驗則公者詐察大臣之可仗而不宜退則强者譎聽而不可施行則才非是權以要官厚祿靦然而謝則髙者猥所憎者去所同者進則非賢時時取黨人之細過暴揚于外如甘辛相反而和水火不同性而濟上疑主心下欺輿人而君子已見其肺肝然施施自以為莫我得也夫生民晨作夜寢早起晡食寒絮暑絺常忽而不為之節何哉然則攝生不可不知也冬許晚絮春許徐褫早許飽夕許慊行立坐偃皆不得久此甚易行毋以吾胃熟生物暖冷物勿以吾氣贊喜怒且憂樂喜怒人所未嘗無也多憂傷神多思傷志過樂喪守喜極氣散怒極氣慉而不下若使吾心為郵候憂樂喜怒至而不久舍母令少宿則善矣若有留彼其以我為囊槖矣掩其耳而聽藐藐由洪洪然掩其目而視了了由眊眊然惡來掩紂之耳武王翺師於孟津之濱宰嚭掩夫差之目勾踐噤笑於會稽之隒歌者不曼其聲則少和舞者不長其袂則寡態左顧者不能右盻勢不兼也櫛之於髮不去亂不能治髻法之於人不誅有罪不能完善人此謂損之而益古語曰斛滿人槩之人滿神槩之聖人其善槩歟大奢槩以中溢欲槩以節寢慢槩以威由是治身由是化人樹果得實樹棘得刺樹德得和樹威得怨嗚呼為國者審所樹而已鶬鶊鳴春蟋蟀吟夏蜩蟧喝秋蟻子戰隂非有命之者氣自動耳鑑向日而火至方諸向月而水至物有自然而感者無逺近之間佞色不能說堯目忠言不能入桀耳色非不美堯識之言非不至桀厭之愚不可詐者民也賤不可勝者衆也撫之為吾之力毒之為吾之賊重兵在邊京師乃單拂軀以尾尾不可大掉之不能反為軀害臂大於指屈伸可使指大不使其臂乃廢剛四肢者骨也剛大厦者棟也剛天下者兵也莫仁於雨露而靡草夏枯莫嚴於霜雪而松柏冬青作法者君守法者臣役法者民臣弄其法主威且劫政在大臣人走私門私門可炙君户將閴父慈於箠家有敗子將礪於鈇士乃忘軀珠丸之珍雀不祈彈也金鼎之貴魚不求烹也䦨金在途無不掇也吐珠在澤無不拾也梟不憑夜弗能自怪政必先鏬姦人投詐父否母然子無適從政産二門下乃告勤君與臣不同而昌君與臣同而亡謀不厭衆決之在一決不能專朝有爭言金鼓既震卒騰於陳爵賜已明士勇于廷重輕不同衡獻其公曲直相欺繩出其私造父亡轡馬顛於跬庸人厲䇿馬為盡力去山弗棲虎喪其威爪牙弗具失所為虎知賢不進朝有刓印知不肖不退挈明入昧我與之生故能為吾死我與之樂故能為吾憂喌于場者雞至嗟于牢者豕集惠於國者天下治足食足衣禮往從之近寒與飢恥則去之贋賈亂㕓窳農敗田讒夫撓邦害馬汙羣忠與邪並黨衆者勝主乃失柄不大其幹而衆其枝幹乃速披言等出於口在賢者為正在不肖為佞櫛所以去亂髮浴所以濯膚垢工圃者飽於茹善邦者羡於食規外求圓無圓矣法外求平無平矣真贋不同物治亂不同日救亂之世不語儒求治之世不語戰水淵則回道衍則聖聖賢授受功不贊漏拙製傷錦迂政損國任賢而二五堯不治含糊不斷上産其亂謀道作舍三年弗架鼎大魚小糜於數攪入林失斧不能得楚主不謹户盜者夜舞樹枝太繁必搖其根苦口之藥疾者甘之拂耳之言明君愛之我憎之能得罰於君我愛之能得賞於君政在於臣黨與成羣君則孤而無民種禾不耰而懟其秋與食為仇兩上不得相事兩下不得相使庭戒諸兒教之持世者三家而已儒家本孔氏道家本老氏佛家本浮屠氏吾世為儒今華吾體者衣冠也榮吾私者官祿也謹吾履者禮法也睿吾職者詩書也入以事親出以事君生以養死以葬莫非儒也由終日戴天不知天之髙終日跖地不知地之重故天下蚩蚩終無謝生於其本者德大而不可見也道家所尚清淨柔弱聞齒以剛而缺不聞舌以柔而折以有為為末無為為本故為者敗之執者失之賊莫大於德有心心有眼吾有大患為吾有身生生者不生化化者不化然其清淨可以治人柔弱可以治身若等服而行之不害為儒也佛家自逺方流入中國其言荒茫奓大多所譬諭合羣迷為真指生死為妄以太虛為體其法曰欲言則差欲心則謬如一漚生一漚滅還入於海漚自妄見海無生滅無有也亦無無有亦無無無淡然無所得而止止亦不止也治戒吾殁後稱家之有亡以治喪斂用濯浣之鶴􅌁紗表帽線履三日棺三月葬慎無為隂陽拘忌棺用雜木漆其四㑹三塗即止使數十年足以臘吾骸朽衣巾而已吾之焄然􅀈􅀈有識者還於造物放之太虛可腐敗者合於黃壚下付無窮吾尚何患掘冢三丈小為冢室劣取容棺及明器左置明水水二盎酒二缸右置米麵二奩朝服一稱私服一稱華履自副左列吾志右刻吾銘即掩壙惟簡惟儉無以金銅雜物置冢中吾學不名家文章僅及中人不足垂後為吏在良二千石下可著數人故無功於國無惠於人不可以請諡有司不可受賵贈又不宜求巨公作志及碑冡上樹五株柏墳髙三尺石翁仲獸不得用蓋自摽置者非千載永安計爾不得作道佛二家齊醮此吾生平所志若等不可違命作之違命作之是死吾也是以吾為遂無知也喪之詣塋以繪布纒棺四翣引勿得作方相俑人陳列衣服器用纍吾之儉吾生平語言無過人者慎無妄編綴作集左志祁之為名宋之為氏學也則儒亦顯其仕行年六十有四孤操完履三封之南葬從孔子右銘生非吾生死非吾死吾亦妄吾要明吾理吾侍上講勸凡十七年上頗記吾面目姓名然身後不得妄丐恩澤為無厭事若等兄弟十四人惟二孺兒未經任子此以諉莒國公莒公在若等不為孤矣孔子稱天下有至德要道謂之孝故自作經一篇以教後人必到於善謂曰至莫不切於事謂曰要舉一孝百行罔不該焉故吾以此教若等凡孝於親則悌於長友於少慈於幼出於事君則為忠於朋友則為信於事為無不敬無不敬則庶乎成人矣若等兄弟十四人雖有異母者但古人謂四海之內皆兄弟况同父均氣乎詩稱死喪之威兄弟孔懷不可不念也兄弟之不懷求合他人他人渠肯信哉縱陽合之彼應背憎也若等視吾事莒公莒公友吾云何可以為法矣大抵人不可以無學至於章奏箋記隨宜為之天分自有所稟不可强也要得數百卷書在胸中則不為人所輕誚矣宋景文筆記卷下
