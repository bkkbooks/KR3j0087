body:
  text: 跋右筆記三卷以數本參訂粗少舛午景文公議論考據精切如此然前輩猶有一二可疑如骨朵字蓋檛字古作朵嘗飾以骨故曰骨朵後世吏文略去草又朵朵二聲相近故訛為朵耳鮑照因武曌而改為昭非誤用也冉耕字伯牛而古犁字亦從牛則牛耕不始於漢矣栘者今郁李也非開而反合者也酈道元水經注云薛瓉注漢書則謂臣瓉為于瓉者非也集韻一書乃景文公與諸公出朴字匹角切與朴同今謂朴無朴音何耶卯乃古卿字又音韲今謂卯本栁字又何耶衎既加點勘又以所聞於前輩者識其後寶慶二年四月初吉上虞李衎謹書
