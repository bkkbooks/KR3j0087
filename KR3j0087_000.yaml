body:
  text: 宋景文筆記雜家類三雜説之屬提要臣等謹案宋景文筆記三卷宋宋祁撰祁字子京安州安陸人後徙開封之雍邱與兄庠同舉天聖初進士官至工部尚書翰林學士承旨諡景文事迹具宋史本傳其書上卷曰釋俗中卷曰考古皆正名物音訓禆於小學者為多亦間及文章史事下卷曰雜記則欲為子書造語竒雋多似焦贑易林談峭化書而終以庭戒沼戒左志右銘未審為平日預作為其後人附入也末有寶慶二年上虞李衎跋稱其可疑者七事如以骨朵為胍􅞷不知朵為朵字之訛以鮑照作昭為誤而不知唐避武后之諱以牛耕始漢趙過而不知冉耕字伯牛古犂字文亦從牛以栘為開而反合而不知為郁李以臣瓉為于瓉而不知酈道元水經注稱薛瓉以朴無朴音而祁所預修之集韻實有蒲候匹角二切以卯本栁字而不知實古卿字所托多中其失然大致考據精確非他説部遊談者比其中如論漢髙祖呂后一條後蘇洵髙祖論全本之又如蕭該漢書音義為顔師古所未見者亦賴此書存其略朝公武讀書志稱是書每章冠以公曰字不知何人所編此本無之或傳刻者所削通考引中興藝文志以是書為紹聖中宋肇次其祖庠之語與公武説異馬端臨謂二筆録卷數相同祁庠又兄弟不能定為一書二書今考書中稱引莒公不一莒公即庠則此録為祁明矣或肇所編又别一書亦名筆録耳乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:61c1390ecad50881708204eaf96b3a220bf3a387c15e847a8a29cf6e0e14fc2c
